<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg,#1a1a2e,#16213e,#0f3460);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Floating background glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle,#ff9800,#ff3d00);
  filter: blur(120px);
  top: -100px;
  right: -100px;
  opacity: 0.6;
}

/* Glass card */
.cart-box {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 650px;
  padding: 50px;
  border-radius: 30px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 60px rgba(255,152,0,0.4);
  color: white;
  animation: fade 0.6s ease;
}

.cart-box h1 {
  text-align: center;
  color: #ff9800;
  font-size: 34px;
  margin-bottom: 30px;
  letter-spacing: 1px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  display: flex;
  justify-content: space-between;
  padding: 15px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 18px;
}

.total {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-top: 25px;
}

.pay-btn {
  margin-top: 35px;
  width: 100%;
  padding: 15px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg,#ff9800,#ff3d00);
  color: white;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

.pay-btn:hover {
  transform: scale(1.07);
  box-shadow: 0 0 30px #ff9800;
}

@keyframes fade {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<div class="cart-box">
  <h1>🛒 Your Cart</h1>

  <ul id="cartItems"></ul>

  <div class="total">
    Total: ₹<span id="total">0</span>
  </div>

  <button class="pay-btn" onclick="goToPayment()">
    Proceed to Payment
  </button>
</div>

<script>
function loadCartPage() {
  const list = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let total = 0;

  list.innerHTML = "";

  if (cart.length === 0) {
    list.innerHTML = "<li>Your cart is empty</li>";
    return;
  }

  cart.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<span>${item.name}</span> <span>₹${item.price}</span>`;
    list.appendChild(li);
    total += Number(item.price);
  });

  totalEl.innerText = total;
}

function goToPayment() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }
  window.location.href = "payment.html";
}

window.onload = loadCartPage;
</script>

</body>
</html>
