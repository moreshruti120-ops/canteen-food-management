<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment</title>
<link rel="stylesheet" href="style.css">

<style>

/* ===== PAYMENT BACKGROUND ===== */

.payment-hero {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1600&auto=format&fit=crop") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.payment-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.8)
  );
}

/* ===== GLASS CARD ===== */

.payment-box {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 450px;
  padding: 50px;
  border-radius: 30px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,152,0,0.2);
  box-shadow: 0 0 70px rgba(255,152,0,0.4);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

.payment-box h1 {
  font-size: 32px;
  margin-bottom: 30px;
  color: #fff;
}

.secure-text {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 20px;
}

/* ===== INPUTS ===== */

.payment-box select,
.payment-box input {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border-radius: 50px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  transition: 0.3s ease;
}

.payment-box input::placeholder {
  color: #ccc;
}

.payment-box input:focus,
.payment-box select:focus {
  box-shadow: 0 0 15px #ff9800;
}

/* ===== PAY BUTTON ===== */

.pay-btn {
  margin-top: 25px;
  padding: 14px;
  width: 100%;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff9800, #ffa726);
  color: #000;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s ease;
}

.pay-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff9800;
}

/* ===== SECURITY BADGE ===== */

.security-badge {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<section class="payment-hero">

  <div class="payment-overlay"></div>

  <div class="payment-box">

    <h1>💳 Secure Payment</h1>
    <p class="secure-text">256-bit SSL encrypted payment</p>

    <select>
      <option>UPI</option>
      <option>Credit Card</option>
      <option>Debit Card</option>
    </select>

    <input type="text" placeholder="Card / UPI ID">
    <input type="password" placeholder="PIN">

    <button class="pay-btn" onclick="processPayment()">
      Pay Now
    </button>

    <div class="security-badge">
      🔒 Secure • Trusted • Encrypted
    </div>

  </div>

</section>

<script>

async function processPayment() {

  const paymentMethod = document.querySelector("select").value;
  const transactionId = document.querySelector("input[type=text]").value;

  const userEmail = localStorage.getItem("loggedInUser");
  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  // Check login
  if (!userEmail) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  // Check cart
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  // Calculate total
  let total = 0;
  cart.forEach(item => total += item.price);

  try {

    const res = await fetch("http://localhost:5000/api/payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userEmail,
        paymentMethod,
        transactionId,
        amount: total,
        items: cart
      })
    });

    const data = await res.json();

    alert(data.message || "Payment Successful 🎉");

    localStorage.removeItem("cart");

    window.location.href = "success.html";

  } catch (error) {

    console.error(error);
    alert("Payment failed. Try again.");

  }

}
</script>
</body>
</html>
