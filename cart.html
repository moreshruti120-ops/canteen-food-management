<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
<div class="overlay"></div>

<div class="cart-box">
<h1>🛒 Your Cart</h1>

<ul id="cartItems"></ul>

<h2>Total: ₹<span id="total">0</span></h2>

<button class="btn primary" onclick="goToPayment()">Proceed to Payment</button>
</div>

<!-- RATING SYSTEM -->
<div class="rating" data-item="Cart Rating">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<p class="rating-text">Rate your experience</p>

</section>

<script>

/* LOAD CART CLEANLY */
document.addEventListener("DOMContentLoaded", function(){

  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const list = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  let total = 0;
  list.innerHTML = "";

  if(cart.length === 0){
    list.innerHTML = "<li>Your cart is empty</li>";
  } else {
    cart.forEach(item => {
      const li = document.createElement("li");
      li.innerText = item.name + " - ₹" + item.price;
      list.appendChild(li);
      total += Number(item.price);
    });
  }

  totalEl.innerText = total;
});

/* SIMPLE RATING SYSTEM */
document.querySelectorAll(".rating span").forEach(star => {
  star.addEventListener("click", function(){
    const value = this.getAttribute("data-value");
    const parent = this.parentElement;

    parent.querySelectorAll("span").forEach(s => {
      s.style.color = s.getAttribute("data-value") <= value
        ? "#ff9800"
        : "#555";
    });

    localStorage.setItem("cartRating", value);
  });
});

</script>

<script src="script.js"></script>
</body>
</html>
