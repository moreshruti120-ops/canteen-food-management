<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Take Away Order</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero" style="background:url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=1600&auto=format&fit=crop') center/cover;">
  
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>🥡 Take Away Mode</h1>
    <p>Your food will be packed & ready</p>

    <div style="margin-top:25px;font-size:22px;">
      🎫 Pickup Token:
      <strong id="token" style="color:#ff9800;"></strong>
    </div>

    <button class="btn primary" style="margin-top:30px;" onclick="confirmTakeaway()">
      Start Ordering
    </button>

    <!-- Show saved token if exists -->
    <p id="savedToken" style="margin-top:20px;color:#ccc;"></p>

  </div>
</section>

<script>

/* Fix overlay blocking clicks */
document.addEventListener("DOMContentLoaded", function() {
  const overlay = document.querySelector(".overlay");
  if (overlay) overlay.style.pointerEvents = "none";
});

/* Generate token */
const token = "TK-" + Math.floor(1000 + Math.random() * 9000);
document.getElementById("token").innerText = token;

/* Show previously generated token */
const oldToken = localStorage.getItem("pickupToken");
if (oldToken) {
  document.getElementById("savedToken").innerText =
    "Previous Token: " + oldToken;
}

function confirmTakeaway() {

  localStorage.setItem("orderMode", "Take Away");
  localStorage.setItem("pickupToken", token);

  alert("✔ Token " + token + " generated.\nYou can now order food.");

  // Redirect to MENU page (multi-page structure)
  window.location.href = "menu.html";
}

</script>

</body>
</html>
